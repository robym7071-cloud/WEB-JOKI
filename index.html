<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Robystore Joki FF</title>

<style>
body {
  font-family: Arial;
  background:#020617;
  color:white;
  padding:20px;
}
.box {
  max-width:420px;
  margin:auto;
  background:#1e293b;
  padding:20px;
  border-radius:15px;
}
select,input,button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}
button {
  background:orange;
  font-weight:bold;
}
.harga {
  margin-top:10px;
  color:yellow;
}
.status {
  margin-top:10px;
  text-align:center;
}
</style>
</head>

<body>

<div class="box">
<h2>🔥 Jasa Joki FF Robystore</h2>

<select id="mode">
<option value="ranked">Ranked Bermuda</option>
<option value="squad">Ranked Squad</option>
</select>

<select id="rank">
<option value="bronze">Bronze</option>
<option value="silver">Silver</option>
<option value="gold">Gold</option>
<option value="platinum">Platinum</option>
<option value="diamond">Diamond</option>
<option value="heroic">Heroic</option>
<option value="grandmaster">Grandmaster</option>
</select>

<select id="paket">
<option value="1">1 Game</option>
<option value="3">3 Game</option>
<option value="5">5 Game</option>
</select>

<div class="harga" id="harga">Rp 5.000</div>

<input id="nama" placeholder="Nama">
<input id="idff" placeholder="ID Free Fire">

<h3>Pembayaran</h3>
<select id="metode">
<option value="dana">DANA</option>
<option value="gopay">GoPay</option>
</select>

<input type="file" id="bukti">

<button onclick="order()">ORDER SEKARANG</button>

<div class="status" id="status"></div>
</div>

<script type="module">

// 🔥 IMPORT FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

// 🔑 CONFIG KAMU (WAJIB GANTI)
const firebaseConfig = {
  apiKey: "AIzaSyDgCpWXHCdv8d5dN3IF4Viiaf8ql44B_1g",
  authDomain: "webmabarff.firebaseapp.com",
  databaseURL: "https://ISI-default-rtdb.firebaseio.com",
  projectId: "webmabarff",
  storageBucket: "webmabarff.firebasestorage.app",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

content://com.android.externalstorage.documents/tree/primary%3ADownload%2Fff-joki-pro::primary:Download/ff-joki-pro/index.html// 💰 HARGA
const hargaBase = {
  ranked:{bronze:5000,silver:7000,gold:10000,platinum:15000,diamond:20000,heroic:30000,grandmaster:50000},
  squad:{bronze:8000,silver:10000,gold:15000,platinum:20000,diamond:30000,heroic:40000,grandmaster:70000}
};

const mode = document.getElementById("mode");
const rank = document.getElementById("rank");
const paket = document.getElementById("paket");
const hargaText = document.getElementById("harga");

// 🔄 UPDATE HARGA
function updateHarga(){
  let total = hargaBase[mode.value][rank.value] * paket.value;
  hargaText.innerText = "Rp " + total.toLocaleString();
}
mode.onchange = rank.onchange = paket.onchange = updateHarga;

// 🚀 ORDER
window.order = async function(){
  const nama = document.getElementById("nama").value;
  const idff = document.getElementById("idff").value;
  const metode = document.getElementById("metode").value;
  const file = document.getElementById("bukti").files[0];

  if(!nama || !idff || !file){
    alert("Lengkapi data + bukti!");
    return;
  }

  document.getElementById("status").innerText = "Uploading...";

  try {
    // upload bukti
    const storageRef = sRef(storage, "bukti/" + Date.now());
    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);

    // simpan ke database
    const data = {
      nama,
      idff,
      metode,
      mode: mode.value,
      rank: rank.value,
      paket: paket.value,
      harga: hargaText.innerText,
      bukti: url,
      status: "menunggu verifikasi",
      waktu: new Date().toLocaleString()
    };

    await push(ref(db,"orders"), data);

    document.getElementById("status").innerText = "✅ Order berhasil!";
  } catch(err){
    document.getElementById("status").innerText = "❌ Error: " + err;
  }
}

</script>

</body>
</html>
